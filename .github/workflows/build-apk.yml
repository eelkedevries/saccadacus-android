# Android stack CI: builds a debug APK on a GitHub-hosted runner and exposes it
# as a downloadable artefact. No on-device compilation and no signing secrets —
# the debug key suffices for sideloading. Hosted ubuntu-latest runners are
# x86-64 glibc machines with the Android SDK preinstalled, so no SDK/Gradle setup
# action is needed and the on-device aarch64 / aapt2 constraints do not apply.
#
# This is the automated safety net for the commit-to-`main` workflow: it runs on
# every push (and PRs to main), so broken builds or leaked secrets are caught
# mechanically even if local pre-commit hooks were never installed.
name: Build APK

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the gitleaks step can diff multi-commit pushes
          # (a shallow clone lacks parent commits and fails the range scan).
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # On pushes to main, also publish the APK to a rolling "latest" GitHub Release
      # so it can be installed with one tap from the Releases page (no zip/adb).
      - name: Publish APK to the rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug APK
          make_latest: true
          body: >-
            One-tap debug build for sideloading. Download **app-debug.apk** below and
            install it on your phone. Debug-signed; not for distribution.
          files: app/build/outputs/apk/debug/app-debug.apk

      - name: Validate prompt numbering
        run: bash scripts/validate-prompts.sh

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
